<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <title>Prota idle pixel art 64x64 mirando a la derecha</title>
  <desc>Sprite pixel art estilo retro 32 bits inspirado en acción/plataformas PS1, orientado hacia la derecha.</desc>

  <rect width="64" height="64" fill="none"/>

  <!-- Sombra suelo -->
  <rect x="18" y="56" width="30" height="2" fill="#00000022"/>

  <!-- Cabeza (bola amarilla) en silueta 3/4 hacia derecha -->
  <rect x="15" y="8" width="2" height="1" fill="#8b6407"/>
  <rect x="17" y="7" width="6" height="1" fill="#8b6407"/>
  <rect x="23" y="6" width="16" height="1" fill="#8b6407"/>
  <rect x="39" y="7" width="8" height="1" fill="#8b6407"/>
  <rect x="47" y="8" width="2" height="1" fill="#8b6407"/>

  <rect x="13" y="9" width="2" height="2" fill="#8b6407"/>
  <rect x="15" y="8" width="34" height="1" fill="#f2c92c"/>
  <rect x="49" y="9" width="2" height="2" fill="#8b6407"/>

  <rect x="12" y="11" width="1" height="5" fill="#8b6407"/>
  <rect x="13" y="10" width="38" height="1" fill="#f2c92c"/>
  <rect x="13" y="11" width="38" height="5" fill="#f2c92c"/>
  <rect x="51" y="11" width="1" height="5" fill="#8b6407"/>

  <rect x="11" y="16" width="1" height="15" fill="#8b6407"/>
  <rect x="12" y="16" width="40" height="15" fill="#f2c92c"/>
  <rect x="52" y="16" width="1" height="15" fill="#8b6407"/>

  <rect x="12" y="31" width="40" height="10" fill="#e6ba27"/>
  <rect x="52" y="31" width="1" height="10" fill="#8b6407"/>
  <rect x="11" y="31" width="1" height="10" fill="#8b6407"/>

  <rect x="13" y="41" width="38" height="3" fill="#d3a41d"/>
  <rect x="14" y="44" width="36" height="2" fill="#c49317"/>

  <!-- Brillo izquierda -->
  <rect x="17" y="12" width="8" height="4" fill="#ffe982"/>
  <rect x="18" y="16" width="4" height="3" fill="#ffe982"/>

  <!-- Cejas marrones -->
  <rect x="22" y="15" width="7" height="2" fill="#744318"/>
  <rect x="36" y="14" width="8" height="2" fill="#744318"/>

  <!-- Gafas oscuras mirando derecha: lente derecha más protagonista -->
  <rect x="20" y="19" width="26" height="2" fill="#0f141a"/>
  <rect x="19" y="21" width="10" height="7" fill="#0f141a"/>
  <rect x="30" y="21" width="16" height="8" fill="#0f141a"/>

  <rect x="20" y="22" width="8" height="5" fill="#2a5f9e"/>
  <rect x="31" y="22" width="14" height="6" fill="#1f4d86"/>
  <rect x="32" y="23" width="12" height="3" fill="#2f76bb"/>

  <!-- Sonrisa con dientes -->
  <rect x="24" y="32" width="18" height="2" fill="#7a351e"/>
  <rect x="26" y="34" width="16" height="5" fill="#f8f8f8"/>
  <rect x="26" y="34" width="16" height="1" fill="#d6d6d6"/>
  <rect x="26" y="38" width="16" height="1" fill="#c8c8c8"/>
  <rect x="30" y="34" width="1" height="5" fill="#cfcfcf"/>
  <rect x="34" y="34" width="1" height="5" fill="#cfcfcf"/>
  <rect x="38" y="34" width="1" height="5" fill="#cfcfcf"/>

  <!-- Guante izquierdo (sin brazo) -->
  <rect x="8" y="23" width="5" height="6" fill="#f2f2f2"/>
  <rect x="9" y="22" width="3" height="1" fill="#f2f2f2"/>
  <rect x="12" y="24" width="2" height="2" fill="#f2f2f2"/>
  <rect x="8" y="29" width="5" height="1" fill="#aaaaaa"/>

  <!-- Guante derecho (thumbs up) -->
  <rect x="52" y="30" width="5" height="7" fill="#f2f2f2"/>
  <rect x="56" y="27" width="3" height="5" fill="#f2f2f2"/>
  <rect x="52" y="37" width="6" height="1" fill="#aaaaaa"/>

  <!-- Zapatos simples: verde + parte superior azul -->
  <rect x="20" y="49" width="11" height="5" fill="#3a9644"/>
  <rect x="21" y="48" width="7" height="2" fill="#2f62b3"/>
  <rect x="20" y="54" width="11" height="1" fill="#235828"/>

  <rect x="34" y="50" width="13" height="5" fill="#3a9644"/>
  <rect x="36" y="48" width="8" height="3" fill="#2f62b3"/>
  <rect x="34" y="55" width="13" height="1" fill="#235828"/>

  <!-- Contorno base -->
  <rect x="13" y="45" width="1" height="1" fill="#8b6407"/>
  <rect x="50" y="45" width="1" height="1" fill="#8b6407"/>
</svg>
