<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <title>Prota idle 64x64</title>
  <desc>Sprite idle estilo retro de protagonista emoji amarillo con lentes, guantes y zapatos.</desc>

  <!-- Fondo transparente -->
  <rect x="0" y="0" width="64" height="64" fill="none"/>

  <!-- Cuerpo (emoji amarillo) -->
  <circle cx="32" cy="28" r="22" fill="#f2c92c" stroke="#7d5609" stroke-width="1"/>
  <ellipse cx="38" cy="35" rx="14" ry="10" fill="#c79a1d" opacity="0.45"/>
  <ellipse cx="24" cy="18" rx="9" ry="7" fill="#fff08a" opacity="0.55"/>

  <!-- Cejas -->
  <rect x="21" y="14" width="9" height="3" rx="1" fill="#744318"/>
  <rect x="35" y="14" width="9" height="3" rx="1" fill="#744318"/>

  <!-- Lentes de sol -->
  <rect x="15" y="20" width="34" height="11" rx="5" fill="#11161c"/>
  <ellipse cx="24" cy="25.5" rx="7" ry="4.5" fill="#24508c" stroke="#2f7bc1" stroke-width="1"/>
  <ellipse cx="40" cy="25.5" rx="7" ry="4.5" fill="#24508c" stroke="#2f7bc1" stroke-width="1"/>

  <!-- Sonrisa y dientes -->
  <path d="M20 38 Q32 45 44 38" fill="none" stroke="#7a351e" stroke-width="2" stroke-linecap="round"/>
  <rect x="24" y="34" width="16" height="6" rx="1" fill="#f8f8f8" stroke="#bfbfbf" stroke-width="1"/>
  <line x1="28" y1="34" x2="28" y2="40" stroke="#d1d1d1"/>
  <line x1="32" y1="34" x2="32" y2="40" stroke="#d1d1d1"/>
  <line x1="36" y1="34" x2="36" y2="40" stroke="#d1d1d1"/>

  <!-- Guantes (sin brazos) -->
  <circle cx="9" cy="24" r="4" fill="#f2f2f2" stroke="#aaaaaa" stroke-width="1"/>
  <circle cx="12" cy="21" r="3" fill="#f2f2f2" stroke="#aaaaaa" stroke-width="1"/>
  <circle cx="14" cy="25" r="3" fill="#f2f2f2" stroke="#aaaaaa" stroke-width="1"/>

  <circle cx="52" cy="33" r="4" fill="#f2f2f2" stroke="#aaaaaa" stroke-width="1"/>
  <circle cx="57" cy="29" r="3" fill="#f2f2f2" stroke="#aaaaaa" stroke-width="1"/>
  <circle cx="57" cy="36" r="4" fill="#f2f2f2" stroke="#aaaaaa" stroke-width="1"/>

  <!-- Zapatos verde + azul -->
  <ellipse cx="24" cy="54" rx="6" ry="4" fill="#3a9644" stroke="#235828" stroke-width="1"/>
  <polygon points="18,52 24,47 30,52" fill="#2f62b3" stroke="#1f4477" stroke-width="1"/>

  <ellipse cx="40" cy="55" rx="7" ry="4" fill="#3a9644" stroke="#235828" stroke-width="1"/>
  <polygon points="33,52 40,46 47,52" fill="#2f62b3" stroke="#1f4477" stroke-width="1"/>
</svg>
